<!DOCTYPE html>
<html lang="uz">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natija</title>
</head>
<body>
    <h2>Natija:</h2>

    {% if res|length == 1 %}
        <p>{{ res[0] }}</p>
    {% else %}
        <p><b>Foydalanuvchi nomi:</b> {{ res[0] }}</p>
        <p><b>Telefon:</b> {{ res[1] }}</p>
        <p><b>Yosh:</b> {{ res[2] }}</p>
    {% endif %}

    <br>
    <a href="/">Orqaga qaytish</a>
</body>
</html>
